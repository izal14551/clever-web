apiVersion: apps/v1
kind: Deployment
metadata:
  name: clever-web
  namespace: clevermom
spec:
  replicas: 2
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: clever-web
  template:
    metadata:
      labels:
        app: clever-web
    spec:
      containers:
        - name: clever-web
          image: clever-web:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 3000
          envFrom:
            - configMapRef:
                name: clever-web-config
            - secretRef:
                name: clever-web-secret
          startupProbe:
            httpGet:
              path: /api/healthz
              port: http
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi

apiVersion: v1
kind: Secret
metadata:
  name: clever-web-secret
  namespace: clevermom
type: Opaque
stringData:
  # Sensitive Config
  NEXTAUTH_SECRET: replace-with-a-random-secret
  GOOGLE_CLIENT_ID: your-google-client-id
  GOOGLE_CLIENT_SECRET: your-google-client-secret
  BLOGGER_API_KEY: your-blogger-api-key
  APPS_SCRIPT_API_KEY: replace-with-a-strong-shared-secret
  # Config
  NEXTAUTH_URL: "https://your-domain.example.com"
  BLOGGER_BLOG_ID: "your-blogger-blog-id"
  APPS_SCRIPT_URL: "your-apps-script-url"
